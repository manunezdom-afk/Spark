<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Base diagonal sweep: orange → coral → purple → blue -->
    <linearGradient id="sweep" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff8a4c"/>
      <stop offset="32%" stop-color="#ff5d8f"/>
      <stop offset="66%" stop-color="#9d6bd9"/>
      <stop offset="100%" stop-color="#5b8aee"/>
    </linearGradient>
    <!-- Counter-sweep to add orange warmth on the other diagonal -->
    <linearGradient id="warm" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff8a4c" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#ff5d8f" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ff8a4c" stop-opacity="0.3"/>
    </linearGradient>
    <!-- White glow highlight (upper-left, like the CSS radial in BrandOrb) -->
    <radialGradient id="shine" cx="35%" cy="30%" r="52%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.92)"/>
      <stop offset="55%" stop-color="rgba(255,255,255,0.38)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <clipPath id="circle">
      <circle cx="256" cy="256" r="256"/>
    </clipPath>
  </defs>
  <g clip-path="url(#circle)">
    <rect width="512" height="512" fill="url(#sweep)"/>
    <rect width="512" height="512" fill="url(#warm)"/>
    <rect width="512" height="512" fill="url(#shine)"/>
  </g>
</svg>
